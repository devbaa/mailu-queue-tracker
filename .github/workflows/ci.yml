name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck and mawk
        run: sudo apt-get update && sudo apt-get install -y shellcheck mawk
      - name: Lint shell scripts
        run: shellcheck -s bash bin/*.sh install.sh tests/*.sh
      - name: Run test suite
        run: bash tests/run.sh
